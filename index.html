<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mini CRM</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <script>
            (function(){
                const token = localStorage.getItem("token");

                if(!token){
                    window.location.replace("login.html");
                }
            })();
        </script>
    <!-- Header Navigation -->
    <header>
        <h2>Client Lead Management Dashboard</h2>
        <nav class="top-nav">
            <button onclick="showSection('home', this)">Home</button>
            <button onclick="showSection('leads', this)">View Leads</button>
            <button onclick="logout()">Log Out</button>
        </nav>
    </header>

    <main class="content">
        <!-- Home Section -->
        <section id="home" class="card active">
            <h2>Add Lead</h2>
            <form id="leadForm">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Name" required>

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Email" required>

                <label for="source">Source</label>
                <input type="text" id="source" placeholder="Source" required>

                <button type="submit">Add Lead</button>
            </form>
        </section>

        <!-- Leads Section -->
        <section id="leads" class="card">
            <h2>Leads</h2>
            <div class="filter-bar">
                <input type="text" id="searchName" placeholder="Search by name">
                <select id="filterStatus">
                <option value="">All</option>
                <option value="new">New</option>
                <option value="contacted">Contacted</option>
                <option value="converted">Converted</option>
                </select>
                <button onclick="filterLeads()">Search</button>
            </div>
            <div id="leadsContainer" class="container"></div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        function logout(){
        localStorage.clear();
        window.location.href = "login.html";
        }
    </script>
    </body>
</html>
