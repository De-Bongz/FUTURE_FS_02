<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Authentication</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="login-body">
        <div class="box">
            <h2 id="form-title">Sign In</h2>

            <!-- Toggle buttons -->
            <div class="auth-toggle">
                <button onclick="showForm('signin')" class="active-btn">Sign In</button>
                <button onclick="showForm('signup')">Sign Up</button>
            </div>

            <!-- Sign In Form -->
            <div id="signin-form" class="auth-form active">
                <input id="username" placeholder="Username">
                <input id="password" type="password" placeholder="Password">
                <button onclick="login()">Login</button>

                <div id="loading" class="spinner" style="display:none;"></div>
            </div>

            <!-- Sign Up Form -->
            <form id="signup-form" class="auth-form">
                <input id="new-username" placeholder="Username">
                <input id="new-email" type="email" placeholder="Email">
                <input id="new-password" type="password" placeholder="Password">
                <button onclick="signup()">Register</button>

                <div id="signup-loading" class="spinner" style="display:none;"></div>
            </form>

            <p class="error" id="error"></p>
        </div>

        <script src="script.js"></script>
        <script>
            function showForm(type){
            document.getElementById("signin-form").classList.remove("active");
            document.getElementById("signup-form").classList.remove("active");
            document.querySelectorAll(".auth-toggle button").forEach(btn => btn.classList.remove("active-btn"));

            if(type === "signin"){
                document.getElementById("signin-form").classList.add("active");
                document.getElementById("form-title").textContent = "Sign In";
                document.querySelector(".auth-toggle button:first-child").classList.add("active-btn");
            } else {
                document.getElementById("signup-form").classList.add("active");
                document.getElementById("form-title").textContent = "Sign Up";
                document.querySelector(".auth-toggle button:last-child").classList.add("active-btn");
            }
            }
        </script>
    </body>
</html>
